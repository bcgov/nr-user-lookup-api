# Local backend container. Builds the Spring Boot image and runs it.
# Supply the BCeID credentials (and optionally Keycloak overrides) via a .env
# file or your shell environment before running `docker compose up`.
services:
  backend:
    container_name: backend
    build: ./backend
    ports: ["8080:8080"]
    environment:
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-https://dev.loginproxy.gov.bc.ca/auth/realms/standard}
      BCEID_WEB_SERVICE_URL: ${BCEID_WEB_SERVICE_URL:-https://gws1.development.bceid.ca/webservices/Client/V10/BCeIDService.asmx}
      BCEID_WEB_SERVICE_OSID: ${BCEID_WEB_SERVICE_OSID:-}
      BCEID_WEB_SERVICE_REQUESTER_USER_GUID: ${BCEID_WEB_SERVICE_REQUESTER_USER_GUID:-}
      BCEID_WEB_SERVICE_USERNAME: ${BCEID_WEB_SERVICE_USERNAME:-}
      BCEID_WEB_SERVICE_PASSWORD: ${BCEID_WEB_SERVICE_PASSWORD:-}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
