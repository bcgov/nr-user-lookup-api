name: Reusable Tests

on:
  workflow_call:
    inputs:
      target:
        description: PR number, test or prod
        default: ${{ github.event.number }}
        type: string

env:
  DOMAIN: apps.silver.devops.gov.bc.ca
  PREFIX: ${{ github.event.repository.name }}-${{ inputs.target }}

permissions: {}

jobs:
  smoke-test:
    name: Smoke Test (health)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Wait for backend health check
        env:
          BASE_URL: https://${{ env.PREFIX }}.${{ env.DOMAIN }}
        run: |
          echo "Waiting for backend health check at ${BASE_URL}/actuator/health..."
          for i in {1..30}; do
            status=$(curl -k --connect-timeout 5 --max-time 10 -s -o /dev/null -w "%{http_code}" "${BASE_URL}/actuator/health" || true)
            if [ "$status" -eq 200 ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting for health check (HTTP $status), retrying in 10s... ($i/30)"
            sleep 10
          done
          echo "ERROR: Backend did not become healthy in time."
          exit 1
