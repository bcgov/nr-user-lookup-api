# Reusable Deploy - backend only (stateless BCeID lookup API)
name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub/OpenShift environment
        default: ""
        type: string
      target:
        description: Deployment target; usually PR number, test or prod
        default: ${{ github.event.number }}
        type: string
      tag:
        description: Container tag
        default: ${{ github.event.number }}
        type: string
      triggers:
        description: Triggers for deployment
        default: ""
        type: string

    secrets:
      oc_namespace:
        description: OpenShift namespace
        required: true
      oc_token:
        description: OpenShift token
        required: true
      bceid_web_service_osid:
        description: BCeID web service online service id (OSID)
        required: true
      bceid_web_service_requester_user_guid:
        description: Internal IDIR requester GUID used on every lookup
        required: true
      bceid_web_service_username:
        description: BCeID web service Basic auth username
        required: true
      bceid_web_service_password:
        description: BCeID web service Basic auth password
        required: true
      keycloak_sa_client_id:
        description: Keycloak service-account client id used to sync client scopes
        required: false
      keycloak_sa_client_secret:
        description: Keycloak service-account client secret (needs realm-management 'manage-clients') for syncing client scopes
        required: false

    outputs:
      triggered:
        description: Has deployment been triggered?
        value: ${{ jobs.deploy.outputs.triggered }}

permissions: {}

jobs:
  deploy:
    name: Deploy (backend)
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    # Surfaced as job env so the step's `if:` can gate on it — the `secrets`
    # context isn't available in step `if:` conditions, but `env` is.
    env:
      KC_SA_CLIENT_ID: ${{ secrets.keycloak_sa_client_id }}
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6

      # Idempotently create the API's OAuth2 client scopes in this environment's
      # Keycloak realm. Skipped unless the service-account client id is configured.
      - name: Ensure Keycloak client scopes
        if: ${{ env.KC_SA_CLIENT_ID != '' }}
        env:
          KEYCLOAK_ISSUER_URI: ${{ vars.KEYCLOAK_ISSUER_URI }}
          KC_SA_CLIENT_SECRET: ${{ secrets.keycloak_sa_client_secret }}
        run: ./.github/scripts/ensure-keycloak-scopes.sh

      - uses: bcgov/action-deployer-openshift@fc51e6a5849eb0fdb9395ceed9c1059aa25b3815 # v4.1.1
        id: deploy
        with:
          file: backend/openshift.deploy.yml
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          debug: true
          # Lite mode strips HPA + PDB and scales to 1 replica for PR/sandbox deploys
          lite_mode: ${{ github.event_name == 'pull_request' }}
          parameters: -p ZONE="${{ inputs.target }}"
            -p NAME="${{ github.event.repository.name }}"
            -p IMAGE_TAG="${{ inputs.tag }}"
            -p KEYCLOAK_ISSUER_URI="${{ vars.KEYCLOAK_ISSUER_URI }}"
            -p BCEID_WEB_SERVICE_URL="${{ vars.BCEID_WEB_SERVICE_URL }}"
            -p BCEID_WEB_SERVICE_OSID="${{ secrets.bceid_web_service_osid }}"
            -p BCEID_WEB_SERVICE_REQUESTER_USER_GUID="${{ secrets.bceid_web_service_requester_user_guid }}"
            -p BCEID_WEB_SERVICE_USERNAME="${{ secrets.bceid_web_service_username }}"
            -p BCEID_WEB_SERVICE_PASSWORD="${{ secrets.bceid_web_service_password }}"
          triggers: ${{ inputs.triggers }}
